<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Register | DashDeal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">DASHDEAL ✨</a>
    </header>

    <div class="auth-wrapper">
        <div id="login-section" class="form-container">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">LOGIN</button>
            </form>
            <p style="text-align:center; margin-top:20px;">New here? <a href="#" onclick="toggleAuth()" style="color:var(--gold);">Register Now</a></p>
        </div>

        <div id="register-section" class="form-container" style="display: none;">
            <h2>Create Account</h2>
            <form id="register-form">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Create Password" required>
                <button type="submit" class="btn">REGISTER</button>
            </form>
            <p style="text-align:center; margin-top:20px;">Already a member? <a href="#" onclick="toggleAuth()" style="color:var(--gold);">Login instead</a></p>
        </div>
    </div>

    <div id="toast"></div>

    <script src="../js/script.js"></script>
    <script>
        function toggleAuth() {
            const login = document.getElementById('login-section');
            const register = document.getElementById('register-section');
            const isLoginVisible = login.style.display !== "none";
            
            login.style.display = isLoginVisible ? "none" : "block";
            register.style.display = isLoginVisible ? "block" : "none";
        }
        
        // Use the centralized listener from your script.js
        window.onload = initAuthListeners;
    </script>
</body>
</html>
