<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Register | DashDeal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">DASHDEAL</a>
    </header>

    <div class="container">
        <div class="form-container" id="login-section">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">LOGIN</button>
            </form>
            <p>New here? <a href="#" onclick="toggleAuth()">Register Now</a></p>
        </div>

        <div class="form-container" id="register-section" style="display: none;">
            <h2>Create Account</h2>
            <form id="register-form">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Create Password" required>
                <button type="submit" class="btn">REGISTER</button>
            </form>
            <p>Already a member? <a href="#" onclick="toggleAuth()">Login instead</a></p>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // Simple toggle function to switch between Login and Register
        function toggleAuth() {
            const login = document.getElementById('login-section');
            const register = document.getElementById('register-section');
            if (login.style.display === "none") {
                login.style.display = "block";
                register.style.display = "none";
            } else {
                login.style.display = "none";
                register.style.display = "block";
            }
        }

        // Initialize the login/register listeners from script.js
        window.onload = () => {
            initAuthListeners();
        };
    </script>
</body>
</html>
