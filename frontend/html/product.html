<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Collection | DashDeal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration:none; color:black; font-size:1.5rem; font-weight:bold; padding:20px; display:block;">DASHDEAL</a>
    </header>

    <div class="container">
        <div class="filter-bar">
            <select id="category-select" onchange="filterAndSort()">
                <option value="all">All Categories</option>
                <option value="all">All Collections</option>
                <option value="Ethnic Wear">Ethnic Wear</option>
                <option value="Western Wear">Western Wear</option>
                <option value="Handbags & Accessories">Handbags & Accessories</option>
                <option value="Skincare & Beauty">Skincare & Beauty</option>
                <option value="Footwear">Footwear</option>
                <option value="Fine Jewelry">Fine Jewelry</option>
                <option value="Activewear & Yoga">Activewear & Yoga</option>
                <option value="Fragrances">Fragrances</option>
                <option value="Home Aesthetics & Decor">Home Aesthetics & Decor</option>
            </select>
            
            <select id="price-sort" onchange="filterAndSort()">
                <option value="none">Sort By Price</option>
                <option value="low">Price: Low to High</option>
                <option value="high">Price: High to Low</option>
            </select>
        </div>

        <div id="product-list" class="product-grid">
            <p style="text-align:center;">Loading the latest trends...</p>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>window.onload = loadProducts;</script>
</body>
</html>
