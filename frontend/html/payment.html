<div class="container">
    <div class="form-container">
        <h2>SECURE PAYMENT</h2>
        <p style="text-align:center;">Payable: <strong id="pay-total"></strong></p>
        <div class="payment-box">
            <input type="text" placeholder="Card Number" maxlength="16">
            <div style="display:flex; gap:10px;">
                <input type="text" placeholder="MM/YY" style="flex:1;">
                <input type="text" placeholder="CVV" style="flex:1;">
            </div>
        </div>
        <button class="btn" style="width:100%;" onclick="confirmPayment()">AUTHORIZE PAYMENT</button>
    </div>
</div>

<script src="../js/script.js"></script>
<script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    document.getElementById('pay-total').innerText = `₹${total}`;

    async function confirmPayment() {
        alert("Payment Authorized! Recording Order...");
        await processCheckout(); // Calls your existing backend checkout
    }
    function speak(message) {
    const msg = new SpeechSynthesisUtterance(message);
    window.speechSynthesis.speak(msg);
}
</script>
