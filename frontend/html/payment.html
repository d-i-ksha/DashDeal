<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment | DashDeal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="initPaymentVoice()">
    <header>
        <a href="index.html" class="logo">DASHDEAL ✨</a>
    </header>
    
    <div class="auth-wrapper">
        <div class="form-container">
            <h2>SECURE CHECKOUT</h2>
            <p style="text-align:center; margin-bottom: 20px;">
                Amount Payable: <strong id="pay-total" style="color:var(--gold);">₹0</strong>
            </p>
            
            <form id="payment-form">
                <input type="text" id="card-name" placeholder="Cardholder Name" required>
                <input type="text" id="card-number" placeholder="1234 5678 9101 1121" maxlength="16" required>
                <div style="display:flex; gap:10px;">
                    <input type="text" placeholder="MM/YY" style="flex:1;" required>
                    <input type="text" placeholder="CVV" style="flex:1;" required>
                </div>
                <button type="submit" class="btn" style="width:100%; margin-top:20px;">Authorize Payment</button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script src="../js/script.js"></script>
    <script>
        // Calculate total for voice and display
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0);
        document.getElementById('pay-total').innerText = `₹${total}`;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9; // Slightly slower for elegance
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function initPaymentVoice() {
            if (total > 0) {
                speak("Welcome to secure checkout. Please enter your card details to authorize your payment of " + total + " rupees.");
            }
        }

        document.getElementById('payment-form').onsubmit = async (e) => {
            e.preventDefault();
            speak("Processing your payment. Please do not refresh the page.");
            
            // Call the final backend execution from script.js
            await completeOrderExecution(); 
        };
    </script>
</body>
</html>
